{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>

    <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#000000",
            "background-light": "#f7f7f7",
            "background-dark": "#0a0a0a",
          },
          fontFamily: {
            display: ["Manrope", "sans-serif"]
          }
        }
      }
    }
    </script>
    <title>Admin Portal | Verse_Shoes</title>
    <style>
        .h-screen-safe { height: 100vh; height: 100dvh; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display antialiased h-full overflow-hidden">

<div class="flex h-screen-safe w-full overflow-hidden">

  <div class="hidden lg:flex lg:w-1/2 relative flex-col justify-end items-start p-16 overflow-hidden bg-black">
    <img src="{% static 'images/image7.jpeg' %}" 
         class="absolute inset-0 w-full h-full object-cover z-0" 
         alt="Verse Admin Background"
         onerror="this.style.display='none'">
    
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent z-[1]"></div>
    
    <div class="relative z-10 text-white max-w-lg">
      <h1 class="text-6xl font-[1000] tracking-tighter uppercase italic leading-[0.9] mb-4">
        Command <br> <span class="text-transparent" style="-webkit-text-stroke: 1px white;">Center</span>
      </h1>
      <p class="text-[10px] opacity-40 uppercase tracking-[0.3em] font-black">Internal Access Only • Verse_Shoes HQ</p>
    </div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-4 md:p-8 lg:p-12 overflow-y-auto no-scrollbar">
    <div class="w-full max-w-md bg-white dark:bg-[#121212] p-6 md:p-10 rounded-2xl shadow-2xl border border-slate-100 dark:border-white/5 my-auto">

      <div class="mb-10">

        <h2 class="text-4xl font-black uppercase tracking-tighter italic text-slate-900 dark:text-slate-100 mb-2">
          Admin Login
        </h2>
        <p class="text-slate-500 dark:text-[#9e9e9e] text-sm font-medium">
          Enter administrative credentials to proceed.
        </p>
      </div>

      {% if messages %}
      <div class="mb-6 space-y-2">
        {% for message in messages %}
        <div class="p-4 rounded-xl text-xs font-bold bg-red-50 text-red-600 border border-red-100">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'admin_login' %}" class="space-y-5">
        {% csrf_token %}

        <div class="space-y-1.5">
          <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Admin Email</label>
          <input type="email" name="email" required 
                 class="w-full h-12 px-4 rounded-xl border-slate-200 dark:bg-white/5 dark:border-white/10 dark:text-white focus:ring-2 focus:ring-black dark:focus:ring-white transition-all outline-none" 
                 placeholder="admin@verse.shoes"/>
        </div>

        <div class="space-y-1.5">
          <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Security Key</label>
          <div class="relative">
            <input type="password" name="password" id="password" required 
                   class="w-full h-12 pl-4 pr-12 rounded-xl border-slate-200 dark:bg-white/5 dark:border-white/10 dark:text-white focus:ring-2 focus:ring-black dark:focus:ring-white transition-all outline-none" 
                   placeholder="••••••••"/>
            <button type="button" onclick="togglePassword('password', this)" 
                    class="absolute right-4 top-1/2 -translate-y-1/2 opacity-30 hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined text-lg dark:text-white">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex items-center space-x-2 pt-2">
          <input type="checkbox" name="remember" id="remember" class="w-4 h-4 rounded border-slate-300 dark:bg-white/5 text-black focus:ring-black">
          <label for="remember" class="text-[11px] font-bold text-slate-500 uppercase tracking-widest cursor-pointer">
            Authorize Device
          </label>
        </div>

        <button type="submit" class="w-full h-14 bg-black dark:bg-white dark:text-black text-white font-black uppercase tracking-widest text-xs rounded-xl hover:opacity-90 active:scale-[0.98] transition-all shadow-xl mt-4">
          Access Dashboard
        </button>
      </form>

      <div class="mt-12 text-center">
        <a href="{% url 'login' %}" class="text-[10px] text-slate-400 font-black uppercase tracking-widest hover:text-black dark:hover:text-white transition-colors flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm">arrow_back</span>
            Return to Customer Store
        </a>
      </div>

    </div>
  </div>
</div>

<script>
function togglePassword(inputId, button) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
  } else {
    input.type = 'password';
  }
}
</script>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

</body>
</html>
