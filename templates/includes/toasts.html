<!-- Django Messages Toast Notifications -->
{% if messages %}
<!-- change 1: top-6 instead of top-24 so toasts sit correctly on pages without a navbar -->
<div id="toast-container" class="fixed top-6 right-5 z-[9999] flex flex-col items-end gap-3 w-full max-w-sm pointer-events-none">
    {% for message in messages %}
        <div class="toast-message pointer-events-auto transform transition-all duration-300 -translate-y-5 scale-95 opacity-0 flex items-center w-full p-4 bg-white rounded-xl shadow-xl dark:bg-gray-800 border-l-4 
            {% if message.tags == 'success' %}border-green-500
            {% elif message.tags == 'error' %}border-red-500
            {% elif message.tags == 'warning' %}border-yellow-500
            {% elif message.tags == 'info' %}border-blue-500
            {% else %}border-gray-500{% endif %}" 
            role="alert">
            
            <!-- Icon Background & SVG -->
            <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg
                {% if message.tags == 'success' %}text-green-500 bg-green-100 dark:bg-green-800/30 dark:text-green-400
                {% elif message.tags == 'error' %}text-red-500 bg-red-100 dark:bg-red-800/30 dark:text-red-400
                {% elif message.tags == 'warning' %}text-yellow-500 bg-yellow-100 dark:bg-yellow-800/30 dark:text-yellow-400
                {% elif message.tags == 'info' %}text-blue-500 bg-blue-100 dark:bg-blue-800/30 dark:text-blue-400
                {% else %}text-gray-500 bg-gray-100 dark:bg-gray-800/30 dark:text-gray-400{% endif %}">
                
                {% if message.tags == 'success' %}
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
                    </svg>
                {% elif message.tags == 'error' %}
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.5 11.5a1 1 0 0 1-1.414 1.414L10 11.414l-2.086 2.086a1 1 0 0 1-1.414-1.414L8.586 10 6.5 7.914A1 1 0 0 1 7.914 6.5L10 8.586l2.086-2.086a1 1 0 0 1 1.414 1.414L11.414 10l2.086 2.086Z"/>
                    </svg>
                {% elif message.tags == 'warning' %}
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM10 15a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm1-4a1 1 0 0 1-2 0V6a1 1 0 0 1 2 0v5Z"/>
                    </svg>
                {% else %}
                    <!-- Info / Default Icon -->
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
                    </svg>
                {% endif %}
            </div>

            <!-- Message Text -->
            <div class="ml-3 text-sm font-medium text-gray-700 dark:text-gray-300">{{ message }}</div>

            <!-- Close Button -->
            <button type="button" onclick="closeToast(this)" class="ml-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8 dark:bg-gray-800 dark:text-gray-500 dark:hover:text-white dark:hover:bg-gray-700" aria-label="Close">
                <span class="sr-only">Close</span>
                <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                </svg>
            </button>
        </div>
    {% endfor %}
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toasts = document.querySelectorAll('.toast-message');
        
        toasts.forEach((toast, index) => {
            // Animate in
            setTimeout(() => {
                toast.classList.remove('-translate-y-5', 'scale-95', 'opacity-0');
                toast.classList.add('translate-y-0', 'scale-100', 'opacity-100');
            }, 100 + (index * 100));

            // Auto dismiss after 4 seconds
            setTimeout(() => {
                dismissToast(toast);
            }, 4000 + (index * 100));
        });
    });

    function closeToast(button) {
        const toast = button.closest('.toast-message');
        dismissToast(toast);
    }

    function dismissToast(toast) {
        if (!toast) return;
        
        // Animate out
        toast.classList.remove('translate-y-0', 'scale-100', 'opacity-100');
        toast.classList.add('-translate-y-5', 'scale-95', 'opacity-0');
        
        // Remove from DOM after the transition duration
        setTimeout(() => {
            toast.remove();
            
            // Cleanup the container
            const container = document.getElementById('toast-container');
            if (container && container.children.length === 0) {
                container.remove();
            }
        }, 300);
    }
</script>
{% endif %}
